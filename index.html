<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="./src/lain.png">
  
  <title>Luis Felipe Galleguillos</title>
  <meta name="description" content="Luis Felipe Galleguillos Campos personal website" />
</head>
<body>
  <img class="archbackground" src="./src/arch.svg" alt="arch icon"/>
  <img src="./src/dance.gif" alt="gif" class="dance">
  <div class="container">

    <header>
      <div class="titles">
        <h2 class="titles-subtitle">Welcome to my website</h2>
        <h2 class="titles-title">I use Arch BTW</h2>
      </div>
      <div class="info">
        <a href="./src/me.jpg">
          <img class="profile-pic" src="./src/me.jpg" alt="luis felipe galleguillos">
        </a>
        <div class="name">
          <a href="https://github.com/glob-gall">
            <img src="./src/github.svg" alt="github icon">
          </a>
          <h1>Luis Felipe Galleguillos</h1>
        </div>
      </div>
    </header>
  
    <div class="projects">
      <h2 class="projects-title">Cool stuff</h2>

      <div class="projects-wrap">

        <a  href="https://www.trade.galleguillos.me" target="_blank">
          <img class="project-block" src="./src/repos/tradebull.svg" alt="trade-bull app icon">
        </a>
        <a  href="https://www.compiler.galleguillos.me" target="_blank">
          <img class="project-block" src="./src/repos/lo-fi.svg" alt="compiler-video-in-one-tab app icon">
        </a>
        <a  href="https://www.cronometer.galleguillos.me" target="_blank">
          <img class="project-block" src="./src/repos/wojacks.png" alt="cronometer app icon">
        </a>
        <a  href="https://fck-prices.vercel.app/" target="_blank">
          <img class="project-block" src="./src/repos/fck.svg" alt="fck time app icon">
        </a>
        <a  href="https://www.boia.galleguillos.me/" target="_blank">
          <img class="project-block" src="./src/repos/boia.png" alt="fck time app icon">
        </a>

      </div>

    </div>

    <div class="last">

      <h2>Donate</h2>
      <div class="monero">
        <img src="./src/moneroicon.png" alt="monero icon">
        <a href="./src/moneroqr.jpg" target="_blank">
          <img src="./src/moneroqr.jpg" alt="monero qr code">
        </div>
      </a>

    </div>

    
  </div>
</body>
</html>
